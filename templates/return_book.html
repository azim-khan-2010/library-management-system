<!DOCTYPE html>
<html>
<head>
    <title>Return Book</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h1>Issued Books</h1>

<table>

<tr>
    <th>ID</th>
    <th>Student</th>
    <th>Book</th>
    <th>Issue Date</th>
    <th>Due Date</th>
    <th>Action</th>
</tr>

{% for item in issued %}

<tr>

<td>{{ item.id }}</td>
<td>{{ item.name }}</td>
<td>{{ item.title }}</td>
<td>{{ item.issue_date }}</td>
<td>{{ item.due_date }}</td>

<td>
<a href="/return/{{ item.id }}">
Return
</a>
</td>

</tr>

{% endfor %}

</table>

<br>
<a href="/">Dashboard</a>

</body>
</html>
